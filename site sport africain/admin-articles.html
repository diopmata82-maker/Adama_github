<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Articles - Admin</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        .admin-header {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .admin-logo img {
            height: 45px;
        }

        .admin-title {
            color: #1a1a1a;
            font-size: 24px;
            font-weight: 700;
        }

        .admin-back {
            background: #666;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .admin-back:hover {
            background: #555;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .page-header h1 {
            color: #1a1a1a;
            font-size: 32px;
            font-weight: 700;
        }

        .btn-add {
            background: #0f783c;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .btn-add:hover {
            background: #0a5a2d;
            transform: translateY(-2px);
        }

        .articles-table {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f8f9fa;
        }

        th {
            padding: 16px;
            text-align: left;
            color: #666;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 16px;
            border-top: 1px solid #e0e0e0;
            color: #333;
        }

        .article-image {
            width: 80px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
        }

        .article-title-cell {
            font-weight: 600;
            color: #1a1a1a;
        }

        .category-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            text-transform: capitalize;
        }

        .category-football {
            background: #e3f2fd;
            color: #1976d2;
        }

        .category-basketball {
            background: #fff3e0;
            color: #f57c00;
        }

        .category-athletisme {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .category-lutte {
            background: #e8f5e9;
            color: #388e3c;
        }

        .actions-cell {
            display: flex;
            gap: 8px;
        }

        .btn-edit, .btn-delete {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-edit {
            background: #f4a300;
            color: white;
        }

        .btn-edit:hover {
            background: #d48f00;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <div class="admin-header-left">
            <div class="admin-logo">
                <img src="version logo sport africain_logo original.png" alt="Sport Africain">
            </div>
            <h1 class="admin-title">Gestion des Articles</h1>
        </div>
        <a href="admin-dashboard.html" class="admin-back">← Retour</a>
    </div>

    <div class="admin-container">
        <div class="page-header">
            <h1>Tous les articles</h1>
            <a href="admin-create-article.html" class="btn-add">➕ Nouvel article</a>
        </div>

        <div class="articles-table">
            <table>
                <thead>
                    <tr>
                        <th>Image</th>
                        <th>Titre</th>
                        <th>Catégorie</th>
                        <th>Date</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="articles-list">
                    <tr>
                        <td colspan="5">
                            <div class="empty-state">
                                <div class="empty-state-icon">📰</div>
                                <p>Chargement des articles...</p>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="auth-helper.js"></script>
    <script src="api-client.js"></script>
    <script>
        // Vérifier authentification
        AuthHelper.protectPage();

        async function loadArticles() {
            const tbody = document.getElementById('articles-list');

            try {
                const articles = await ArticlesAPI.getAll();

                if (articles.length === 0) {
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="5">
                                <div class="empty-state">
                                    <div class="empty-state-icon">📰</div>
                                    <p>Aucun article pour le moment</p>
                                </div>
                            </td>
                        </tr>
                    `;
                    return;
                }

                tbody.innerHTML = articles.map(article => {
                    const date = new Date(article.date).toLocaleDateString('fr-FR', { 
                        day: 'numeric', 
                        month: 'long', 
                        year: 'numeric' 
                    });
                    
                    return `
                        <tr>
                            <td><img src="${article.image}" alt="${article.title}" class="article-image"></td>
                            <td class="article-title-cell">${article.title}</td>
                            <td><span class="category-badge category-${article.category}">${article.category}</span></td>
                            <td>${date}</td>
                            <td>
                                <div class="actions-cell">
                                    <button class="btn-edit" onclick="editArticle('${article._id}')">Modifier</button>
                                    <button class="btn-delete" onclick="deleteArticle('${article._id}')">Supprimer</button>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
            } catch (error) {
                console.error('Erreur chargement articles:', error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="5">
                            <div class="empty-state">
                                <div class="empty-state-icon">❌</div>
                                <p>Erreur lors du chargement des articles</p>
                            </div>
                        </td>
                    </tr>
                `;
            }
        }

        function editArticle(id) {
            alert('Fonctionnalité de modification à venir');
        }

        async function deleteArticle(id) {
            if (!confirm('Êtes-vous sûr de vouloir supprimer cet article ?')) {
                return;
            }

            try {
                await AdminAPI.deleteArticle(id);
                alert('Article supprimé avec succès');
                loadArticles(); // Recharger la liste
            } catch (error) {
                alert('Erreur lors de la suppression: ' + error.message);
            }
        }

        loadArticles();
    </script>
</body>
</html>
