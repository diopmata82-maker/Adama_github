<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion Profils - Admin</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        .admin-header {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .admin-logo img {
            height: 45px;
        }

        .admin-title {
            color: #1a1a1a;
            font-size: 24px;
            font-weight: 700;
        }

        .admin-back {
            background: #666;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .admin-back:hover {
            background: #555;
        }

        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px;
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .page-header h1 {
            color: #1a1a1a;
            font-size: 32px;
            font-weight: 700;
        }

        .profiles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }

        .profile-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s;
        }

        .profile-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0,0,0,0.12);
        }

        .profile-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .profile-content {
            padding: 20px;
        }

        .profile-name {
            color: #1a1a1a;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .profile-info {
            color: #666;
            font-size: 14px;
            margin-bottom: 4px;
        }

        .profile-sport {
            display: inline-block;
            background: #f0f9f4;
            color: #0f783c;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
            margin-top: 8px;
        }

        .profile-actions {
            display: flex;
            gap: 8px;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid #e0e0e0;
        }

        .btn-edit, .btn-delete {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-edit {
            background: #f4a300;
            color: white;
        }

        .btn-edit:hover {
            background: #d48f00;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-delete:hover {
            background: #c82333;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
            grid-column: 1 / -1;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <div class="admin-header-left">
            <div class="admin-logo">
                <img src="version logo sport africain_logo original.png" alt="Sport Africain">
            </div>
            <h1 class="admin-title">Gestion des Profils</h1>
        </div>
        <a href="admin-dashboard.html" class="admin-back">← Retour</a>
    </div>

    <div class="admin-container">
        <div class="page-header">
            <h1>Profils d'athlètes</h1>
        </div>

        <div class="profiles-grid" id="profiles-list">
            <div class="empty-state">
                <div class="empty-state-icon">👤</div>
                <p>Chargement des profils...</p>
            </div>
        </div>
    </div>

    <script src="auth-helper.js"></script>
    <script src="api-client.js"></script>
    <script>
        // Vérifier authentification
        AuthHelper.protectPage();

        async function loadProfiles() {
            const grid = document.getElementById('profiles-list');

            try {
                const profiles = await AthletesAPI.getAll();

                if (profiles.length === 0) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">👤</div>
                            <p>Aucun profil pour le moment</p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = profiles.map(athlete => `
                    <div class="profile-card">
                        <img src="${athlete.image}" alt="${athlete.name}" class="profile-image">
                        <div class="profile-content">
                            <h3 class="profile-name">${athlete.name}</h3>
                            <div class="profile-info">${athlete.country}</div>
                            <div class="profile-info">${athlete.position || athlete.poste || 'Athlète'}</div>
                            <div class="profile-info">${athlete.club || 'Indépendant'}</div>
                            <span class="profile-sport">${athlete.discipline}</span>
                            <div class="profile-actions">
                                <button class="btn-edit" onclick="editProfile('${athlete._id}')">Modifier</button>
                                <button class="btn-delete" onclick="deleteProfile('${athlete._id}')">Supprimer</button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } catch (error) {
                console.error('Erreur chargement profils:', error);
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <p>Erreur lors du chargement des profils</p>
                    </div>
                `;
            }
        }

        function editProfile(id) {
            alert('Fonctionnalité de modification à venir');
        }

        async function deleteProfile(id) {
            if (!confirm('Êtes-vous sûr de vouloir supprimer ce profil ?')) {
                return;
            }

            try {
                await AdminAPI.deleteAthlete(id);
                alert('Profil supprimé avec succès');
                loadProfiles(); // Recharger la liste
            } catch (error) {
                alert('Erreur lors de la suppression: ' + error.message);
            }
        }

        loadProfiles();
    </script>
</body>
</html>
