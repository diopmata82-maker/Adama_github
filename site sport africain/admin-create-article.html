<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer un Article - Admin</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            min-height: 100vh;
        }

        .admin-header {
            background: white;
            border-bottom: 1px solid #e0e0e0;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-header-left {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .admin-logo img {
            height: 45px;
        }

        .admin-title {
            color: #1a1a1a;
            font-size: 24px;
            font-weight: 700;
        }

        .admin-back {
            background: #666;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }

        .admin-back:hover {
            background: #555;
        }

        .admin-container {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px;
        }

        .page-header {
            margin-bottom: 32px;
        }

        .page-header h1 {
            color: #1a1a1a;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .page-header p {
            color: #666;
            font-size: 16px;
        }

        .form-card {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: block;
            color: #333;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.3s;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: #0f783c;
            box-shadow: 0 0 0 3px rgba(15, 120, 60, 0.1);
        }

        .form-textarea {
            min-height: 200px;
            resize: vertical;
        }

        .form-hint {
            color: #999;
            font-size: 13px;
            margin-top: 6px;
        }

        .form-actions {
            display: flex;
            gap: 16px;
            margin-top: 32px;
        }

        .btn-submit {
            flex: 1;
            background: #0f783c;
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-submit:hover {
            background: #0a5a2d;
            transform: translateY(-2px);
        }

        .btn-cancel {
            background: #e0e0e0;
            color: #666;
            border: none;
            padding: 16px 32px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
            text-align: center;
        }

        .btn-cancel:hover {
            background: #d0d0d0;
        }

        .success-message {
            background: #d4edda;
            color: #155724;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="admin-header">
        <div class="admin-header-left">
            <div class="admin-logo">
                <img src="version logo sport africain_logo original.png" alt="Sport Africain">
            </div>
            <h1 class="admin-title">Créer un Article</h1>
        </div>
        <a href="admin-articles.html" class="admin-back">← Retour</a>
    </div>

    <div class="admin-container">
        <div class="page-header">
            <h1>Nouvel article</h1>
            <p>Remplissez les informations ci-dessous pour créer un nouvel article</p>
        </div>

        <div id="success-message" class="success-message">
            ✓ Article créé avec succès !
        </div>

        <div class="form-card">
            <form id="article-form">
                <div class="form-group">
                    <label class="form-label">Titre de l'article</label>
                    <input type="text" class="form-input" id="title" placeholder="Ex: Le Sénégal remporte la CAN 2026" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Catégorie</label>
                    <select class="form-select" id="category" required>
                        <option value="">Sélectionnez une catégorie</option>
                        <option value="football">Football</option>
                        <option value="basketball">Basketball</option>
                        <option value="athletisme">Athlétisme</option>
                        <option value="lutte">Lutte</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">URL de l'image</label>
                    <input type="url" class="form-input" id="image" placeholder="https://example.com/image.jpg" required>
                    <div class="form-hint">Utilisez une URL d'image depuis Unsplash ou un autre service</div>
                </div>

                <div class="form-group">
                    <label class="form-label">Auteur</label>
                    <input type="text" class="form-input" id="author" placeholder="Ex: Amadou Diallo" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Contenu de l'article</label>
                    <textarea class="form-textarea" id="content" placeholder="Écrivez le contenu de l'article ici..." required></textarea>
                    <div class="form-hint">Utilisez des balises HTML pour la mise en forme (p, h2, etc.)</div>
                </div>

                <div class="form-actions">
                    <a href="admin-articles.html" class="btn-cancel">Annuler</a>
                    <button type="submit" class="btn-submit">Publier l'article</button>
                </div>
            </form>
        </div>
    </div>

    <script src="auth-helper.js"></script>
    <script src="api-client.js"></script>
    <script>
        // Vérifier authentification
        AuthHelper.protectPage();

        document.getElementById('article-form').addEventListener('submit', async function(e) {
            e.preventDefault();

            const submitBtn = this.querySelector('.btn-submit');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Publication en cours...';

            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const image = document.getElementById('image').value;
            const author = document.getElementById('author').value;
            const content = document.getElementById('content').value;

            // Créer l'objet article
            const newArticle = {
                title: title,
                category: category,
                image: image,
                author: author,
                content: content
            };

            try {
                // Créer l'article via l'API
                await AdminAPI.createArticle(newArticle);

                // Afficher message de succès
                document.getElementById('success-message').style.display = 'block';

                // Réinitialiser le formulaire
                this.reset();

                // Rediriger après 2 secondes
                setTimeout(() => {
                    window.location.href = 'admin-articles.html';
                }, 2000);
            } catch (error) {
                alert('Erreur lors de la création de l\'article: ' + error.message);
                submitBtn.disabled = false;
                submitBtn.textContent = 'Publier l\'article';
            }
        });
    </script>
</body>
</html>
